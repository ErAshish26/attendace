<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Attendance Tracker - HR Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 1400px; margin: 0 auto;
            background: white; border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 40px; text-align: center;
        }
        .header h1 { font-size: 2.8em; margin-bottom: 10px; }
        .nav-tabs {
            display: flex; background: #f8f9fa; border-bottom: 3px solid #dee2e6;
        }
        .nav-tab {
            flex: 1; padding: 20px; text-align: center; cursor: pointer;
            transition: all 0.3s; font-weight: 600;
        }
        .nav-tab.active { background: white; color: #667eea; border-bottom: 3px solid #667eea; }
        .nav-tab:hover { background: #e9ecef; }
        .tab-content { display: none; padding: 40px; }
        .tab-content.active { display: block; }
        .form-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; margin-bottom: 25px;
        }
        label {
            display: block; margin-bottom: 8px; font-weight: 600; color: #333;
        }
        input, select {
            width: 100%; padding: 15px; border: 2px solid #e1e5e9;
            border-radius: 12px; font-size: 16px; transition: all 0.3s;
            background: #fafbfc;
        }
        input:focus, select:focus {
            outline: none; border-color: #667eea; background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 15px 35px; border: none;
            border-radius: 12px; cursor: pointer; font-size: 16px;
            font-weight: 600; transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .btn-danger { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%); }
        .employees-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px; margin-top: 30px;
        }
        .employee-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px; border-radius: 20px; border-left: 6px solid #667eea;
            transition: all 0.3s;
        }
        .employee-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .employee-name { font-size: 1.4em; font-weight: bold; color: #2c3e50; margin-bottom: 12px; }
        .employee-id {
            background: rgba(102, 126, 234, 0.1); color: #667eea;
            padding: 5px 12px; border-radius: 20px; font-size: 0.85em;
            font-weight: 600; display: inline-block; margin-bottom: 15px;
        }
        .employee-details {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            font-size: 0.9em; color: #666; margin-bottom: 20px;
        }
        .success-message {
            background: #d4edda; color: #155724; padding: 15px;
            border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #28a745;
            display: none;
        }
        .empty-state {
            text-align: center; padding: 80px 40px; color: #666; font-size: 1.3em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👔 Employee Attendance Tracker</h1>
            <p>Professional HR Management System</p>
        </div>

        <div class="nav-tabs">
            <div class="nav-tab active" data-tab="employees">👥 Employees</div>
            <div class="nav-tab" data-tab="attendance">📋 Attendance</div>
            <div class="nav-tab" data-tab="reports">📊 Reports</div>
        </div>

        <!-- Employees Tab -->
        <div id="employees" class="tab-content active">
            <div class="success-message" id="successMsg">✅ Employee added successfully!</div>
            
            <div class="form-row">
                <h2 style="grid-column: 1/-1; margin-bottom: 25px; color: #333;">Add New Employee</h2>
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="empName" placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label>Employee ID * (EMP001)</label>
                    <input type="text" id="empId" placeholder="EMP001">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="empEmail" placeholder="employee@company.com">
                </div>
                <div class="form-group">
                    <label>Department *</label>
                    <select id="empDept">
                        <option value="">Select Department</option>
                        <option value="IT">💻 IT</option>
                        <option value="HR">👩‍💼 HR</option>
                        <option value="Finance">💰 Finance</option>
                        <option value="Marketing">📈 Marketing</option>
                        <option value="Operations">⚙️ Operations</option>
                        <option value="Sales">💼 Sales</option>
                    </select>
                </div>
                <div style="grid-column: 1/-1;">
                    <button class="btn btn-success" onclick="addEmployee()" style="font-size: 18px; padding: 18px 50px;">
                        ➕ ADD EMPLOYEE
                    </button>
                </div>
            </div>
            
            <div id="employeesList" class="employees-grid"></div>
        </div>

        <!-- Attendance Tab -->
        <div id="attendance" class="tab-content">
            <h2 style="margin-bottom: 25px; color: #333;">Daily Attendance Marking</h2>
            <div style="margin-bottom: 30px;">
                <label style="font-size: 1.1em; margin-bottom: 10px; display: block;">📅 Select Date:</label>
                <input type="date" id="attendanceDate" style="width: 200px; padding: 15px; font-size: 18px;">
                <button class="btn btn-primary" onclick="loadAttendanceForDate()" style="margin-left: 20px; padding: 15px 30px;">
                    🔄 Load Attendance
                </button>
            </div>
            <div id="attendanceGrid" style="min-height: 400px;"></div>
        </div>

        <!-- Reports Tab -->
        <div id="reports" class="tab-content">
            <h2 style="margin-bottom: 30px; color: #333;">📊 Analytics & Reports</h2>
            <div id="reportsContent" style="min-height: 400px;"></div>
        </div>
    </div>

    <script>
        // Global data
        let employees = JSON.parse(localStorage.getItem('employees')) || [];
        let attendance = JSON.parse(localStorage.getItem('attendance')) || {};
        let currentDate = new Date().toISOString().split('T')[0];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('App loaded. Employees:', employees.length);
            updateEmployeesList();
            setupTabNavigation();
            document.getElementById('attendanceDate').value = currentDate;
            updateReports();
        });

        // Tab Navigation
        function setupTabNavigation() {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    const targetTab = this.dataset.tab;
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    document.getElementById(targetTab).classList.add('active');
                });
            });
        }

        // ✅ FIXED: Add Employee Function
        function addEmployee() {
            const name = document.getElementById('empName').value.trim();
            const empId = document.getElementById('empId').value.trim().toUpperCase();
            const email = document.getElementById('empEmail').value.trim();
            const dept = document.getElementById('empDept').value;

            console.log('Adding employee:', {name, empId, email, dept});

            // Validation
            if (!name || !empId || !email || !dept) {
                alert('❌ Please fill all fields marked with *');
                return;
            }

            // Check duplicate ID
            if (employees.find(emp => emp.id === empId)) {
                alert('❌ Employee ID already exists!');
                return;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('❌ Please enter valid email');
                return;
            }

            // Add employee
            const newEmployee = { id: empId, name, email, dept };
            employees.push(newEmployee);
            
            // Save to localStorage
            localStorage.setItem('employees', JSON.stringify(employees));
            
            // Clear form
            document.getElementById('empName').value = '';
            document.getElementById('empId').value = '';
            document.getElementById('empEmail').value = '';
            document.getElementById('empDept').value = '';

            // Show success message
            const successMsg = document.getElementById('successMsg');
            successMsg.style.display = 'block';
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);

            // Update UI
            updateEmployeesList();
            updateReports();
            
            console.log('✅ Employee added successfully. Total employees:', employees.length);
        }

        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.activeElement.id === 'empName') {
                addEmployee();
            }
        });

        // Update employees list
        function updateEmployeesList() {
            const container = document.getElementById('employeesList');
            if (employees.length === 0) {
                container.innerHTML = '<div class="empty-state">👥 No employees yet. Add your first employee above!</div>';
                return;
            }
            
            container.innerHTML = employees.map((emp, index) => `
                <div class="employee-card">
                    <div class="employee-name">${emp.name}</div>
                    <div class="employee-id">ID: ${emp.id}</div>
                    <div class="employee-details">
                        <div>📧 ${emp.email}</div>
                        <div>🏢 ${emp.dept}</div>
                    </div>
                    <button class="btn btn-danger" onclick="removeEmployee(${index})" style="width: 100%; padding: 12px;">
                        🗑️ Remove Employee
                    </button>
                </div>
            `).join('');
        }

        // Remove employee
        function removeEmployee(index) {
            if (confirm('Are you sure? This will delete all records.')) {
                const empId = employees[index].id;
                employees.splice(index, 1);
                localStorage.setItem('employees', JSON.stringify(employees));
                updateEmployeesList();
                updateReports();
            }
        }

        // Attendance functions (basic)
        function loadAttendanceForDate() {
            const container = document.getElementById('attendanceGrid');
            container.innerHTML = '<div class="empty-state">📋 Attendance feature coming soon! Add employees first.</div>';
        }

        function updateReports() {
            const container = document.getElementById('reportsContent');
            container.innerHTML = `
                <div style="text-align: center; padding: 60px; color: #666;">
                    <h3>📊 Total Employees: <strong style="color: #667eea; font-size: 2em;">${employees.length}</strong></h3>
                    <p>✅ Employee management working perfectly!</p>
                    <p>Add more employees to unlock full attendance & reports features.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
